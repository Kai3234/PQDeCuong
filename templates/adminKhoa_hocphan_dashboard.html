{% extends "base.html" %} {% block content %}

<div class="dashboard-container">
  <div class="dashboard-title">Danh sách học phần của khoa</div>

  <!-- SEARCH -->
  <form method="GET" action="/adminKhoa_hocphan_dashboard" class="search-box">
    <select name="type" class="search-select">
      <option value="MaHP" {% if type_search =="MaHP" %}selected{% endif %}>Mã học phần</option>
      <option value="TenHP" {% if type_search =="TenHP" %}selected{% endif %}>Tên học phần</option>
    </select>

    <input
      type="text"
      name="keyword"
      placeholder="Nhập từ khóa..."
      class="search-input"
      value="{{ keyword or '' }}"
    />

    <button type="submit" class="btn-search">Tìm</button>

    <a href="/adminKhoa_hocphan_dashboard" class="btn-reset">Reset</a>
  </form>

  <!-- TABLE -->
  <table class="dashboard-table">
    <thead>
      <tr>
        <th>Mã học phần</th>
        <th>Tên học phần</th>
        <th>Số tín chỉ</th>
        <th>Trình độ</th>
        <th>Khoa</th>
        <th>Phân công</th>
      </tr>
    </thead>

    <tbody>
      {% for hp in dsHocPhan %}

      <tr>
        <td>{{ hp.MaHP }}</td>

        <td>{{ hp.TenHP }}</td>

        <td>{{ hp.SoTC }}</td>

        <td>{{ hp.TrinhDo }}</td>

        <td>{{ hp.MaDV }} - {{ hp.TenDV }}</td>

        <td>
          <a
            class="btn-action btn-edit"
            href="/adminKhoa_hocphan_authorize/{{ hp.MaHP }}"
          >
            Phân công
          </a>
        </td>
      </tr>

      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
