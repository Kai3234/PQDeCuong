{% extends "base.html" %}

{% block title %}
Quản lí học phần
{% endblock %}

{% block content %}

<div class="container">

<div class="page-header">
<h2>Danh sách học phần</h2>
</div>
<div class="search-box">

<form method="GET" action="/admin_hocphan_list">

<input
type="text"
name="keyword"
placeholder="Tìm theo mã học phần hoặc tên học phần"
value="{{ keyword if keyword else '' }}"
>

<button class="btn-save">
Tìm
</button>

</form>

</div>
<div class="table-wrapper">

<table class="hocphan-table">

<thead>
<tr>
<th>Mã HP</th>
<th>Tên học phần</th>
<th>Số tín chỉ</th>
<th>Trình độ</th>
<th>Khoa quản lý</th>
<th>Lưu</th>
</tr>
</thead>

<tbody>

{% for hp in hocphan_list %}

<tr>

<form method="POST" action="/admin/update_hocphan">

<td>{{ hp.MaHP }}</td>

<td>{{ hp.TenHP }}</td>

<td>{{ hp.SoTC }}</td>

<td>{{ hp.TrinhDo }}</td>

<td>

<select name="MaDV" class="select-khoa">

{% for dv in donvi_list %}

<option value="{{ dv.MaDV }}"
{% if dv.MaDV == hp.MaDV %}
selected
{% endif %}
>

{{ dv.TenDV }}

</option>

{% endfor %}

</select>

</td>

<td>

<input type="hidden" name="MaHP" value="{{ hp.MaHP }}">

<button class="btn-save">
Lưu
</button>

</td>

</form>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
